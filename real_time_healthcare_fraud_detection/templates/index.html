<!DOCTYPE html>
<html>
<head>
    <title>Healthcare Fraud Detection</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4 text-center">🩺 Healthcare Fraud Detection</h1>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data" class="mb-4">
        <div class="mb-3">
            <label for="csv_file" class="form-label">Upload Patient Records CSV:</label>
            <input type="file" name="csv_file" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="fraud_type" class="form-label">Select Fraud Type to Detect:</label>
            <select name="fraud_type" class="form-select" required>
                <option value="">-- Choose Fraud Type --</option>
                {% for key, value in fraud_types.items() %}
                    <option value="{{ key }}">{{ value }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-primary">🚀 Predict</button>
    </form>

    {% if table %}
        <h4 class="mt-5">🔍 Prediction Results:</h4>
        <div class="table-responsive">{{ table|safe }}</div>
    {% endif %}
</div>
</body>
</html>
